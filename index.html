<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* Language Toggle Button */
        #lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            z-index: 10;
        }

        #lang-toggle:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        button.action-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.action-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        /* Failsafe Button Styles */
        button.failsafe-btn {
            padding: 10px 20px;
            font-size: 0.9rem;
            background-color: transparent;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            cursor: pointer;
            margin-top: 40px;
            transition: all 0.2s;
        }

        button.failsafe-btn:hover {
            background-color: rgba(255,255,255,0.1);
            color: white;
        }

        #cake-container {
            display: none;
            position: relative;
            margin-top: 100px;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            /* Flex layout to center the cake and failsafe button properly */
            flex-direction: column;
            align-items: center;
        }

        @keyframes popIn {
            0% { transform: scale(0.5) translateY(50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* The Cake Base */
        .cake {
            width: 250px;
            height: 100px;
            background-color: #f7a8b8;
            border-radius: 10px 10px 0 0;
            position: relative;
            border-bottom: 15px solid #d37c8e;
            box-shadow: inset 0 -20px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.3);
        }

        /* The Candles */
        .candles {
            display: flex;
            justify-content: space-around;
            width: 80%;
            position: absolute;
            bottom: 100%;
            left: 10%;
        }

        .candle-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .candle {
            width: 12px;
            height: 40px;
            background: repeating-linear-gradient(
                45deg,
                #fff,
                #fff 5px,
                #ffb3c6 5px,
                #ffb3c6 10px
            );
            border-radius: 3px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* The Flames */
        .flame {
            width: 16px;
            height: 24px;
            background-color: #ff9d00;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px #ff9d00, 0 0 30px #ff5100;
            animation: flicker 0.1s infinite alternate;
            margin-bottom: 2px;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform-origin: bottom center;
        }

        .flame.out {
            opacity: 0;
            animation: none;
            box-shadow: none;
            transform: scale(0);
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-2deg); }
            100% { transform: scale(1.1) rotate(2deg); background-color: #ffc107; }
        }

        /* Smoke Animation */
        .smoke {
            position: absolute;
            top: -10px;
            width: 8px;
            height: 8px;
            background: rgba(200, 200, 200, 0.8);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            animation: riseSmoke 1s ease-out forwards;
        }

        @keyframes riseSmoke {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-40px) scale(3); opacity: 0; }
        }

        /* The Reveal Screen */
        #reveal-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 5;
        }

        #reveal-screen.show {
            display: flex;
            opacity: 1;
        }

        #text-bday-title {
            color: #ffcf40;
            font-size: 4rem;
            margin-bottom: 0;
            text-shadow: 0 0 20px rgba(255, 207, 64, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Mic feedback indicator */
        #mic-level {
            margin-top: 30px;
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            display: none; 
        }
        #mic-bar {
            height: 100%;
            width: 0%;
            background: #4caf50;
            transition: width 0.1s;
        }

    </style>
</head>
<body>

    <button id="lang-toggle">ESP</button>

    <div id="start-screen">
        <h2 id="text-ready-title">Ready for your cake?</h2>
        <p id="text-ready-desc">(Make sure to allow microphone access so you can blow out the candles!)</p>
        <button id="start-btn" class="action-btn">Bring out the Cake</button>
    </div>

    <div id="cake-container">
        <div class="cake">
            <div class="candles">
                <div class="candle-wrapper"><div class="flame"></div><div class="candle"></div></div>
                <div class="candle-wrapper"><div class="flame"></div><div class="candle"></div></div>
                <div class="candle-wrapper"><div class="flame"></div><div class="candle"></div></div>
            </div>
        </div>
        <div id="mic-level"><div id="mic-bar"></div></div>
        
        <button id="failsafe-btn" class="failsafe-btn">Mic not working? Tap to blow</button>
    </div>

    <div id="reveal-screen">
        <h1 id="text-bday-title">Happy Birthday! 🎉</h1>
    </div>

    <script>
        // Dictionary for Translations
        const dict = {
            en: {
                readyTitle: "Ready for your cake?",
                readyDesc: "(Make sure to allow microphone access so you can blow out the candles!)",
                startBtn: "Bring out the Cake",
                bdayTitle: "Happy Birthday! 🎉",
                toggleTxt: "ESP",
                failsafeBtn: "Mic not working? Tap to blow"
            },
            es: {
                readyTitle: "¿Listo para tu pastel?",
                readyDesc: "(¡Asegúrate de permitir el acceso al micrófono para poder apagar las velas!)",
                startBtn: "Traer el Pastel",
                bdayTitle: "¡Feliz Cumpleaños! 🎉",
                toggleTxt: "ENG",
                failsafeBtn: "¿No funciona el micrófono? Toca para soplar"
            }
        };

        let currentLang = 'en';

        // DOM Elements
        const langToggle = document.getElementById('lang-toggle');
        const textReadyTitle = document.getElementById('text-ready-title');
        const textReadyDesc = document.getElementById('text-ready-desc');
        const startBtn = document.getElementById('start-btn');
        const textBdayTitle = document.getElementById('text-bday-title');
        const failsafeBtn = document.getElementById('failsafe-btn');
        
        const startScreen = document.getElementById('start-screen');
        const cakeContainer = document.getElementById('cake-container');
        const revealScreen = document.getElementById('reveal-screen');
        const candleWrappers = document.querySelectorAll('.candle-wrapper');
        const micBar = document.getElementById('mic-bar');

        // Audio Variables
        let audioContext;
        let analyser;
        let microphone;
        let activeCandles = candleWrappers.length;
        let isBlowing = false;

        // Configuration
        const BLOW_THRESHOLD = 60; 

        // Language Toggle Logic
        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'es' : 'en';
            
            textReadyTitle.innerText = dict[currentLang].readyTitle;
            textReadyDesc.innerText = dict[currentLang].readyDesc;
            startBtn.innerText = dict[currentLang].startBtn;
            textBdayTitle.innerText = dict[currentLang].bdayTitle;
            failsafeBtn.innerText = dict[currentLang].failsafeBtn;
            langToggle.innerText = dict[currentLang].toggleTxt;
        });

        // Start Experience
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                startScreen.style.opacity = '0';
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    cakeContainer.style.display = 'flex';
                }, 500);

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                microphone.connect(analyser);
                analyser.fftSize = 256;

                checkVolume();
                
            } catch (err) {
                // If they deny mic access, show the cake anyway so they can use the failsafe
                startScreen.style.display = 'none';
                cakeContainer.style.display = 'flex';
                
                const errorMsg = currentLang === 'es' ? 
                    "¡Micrófono bloqueado! Usa el botón debajo del pastel para soplar." : 
                    "Mic access blocked! Use the button below the cake to blow them out.";
                console.error(errorMsg, err);
            }
        });

        // Failsafe Button Logic
        failsafeBtn.addEventListener('click', () => {
            failsafeBtn.style.display = 'none'; // Hide button once clicked
            
            // Stagger the blowout effect automatically
            let blowInterval = setInterval(() => {
                if (activeCandles > 0) {
                    blowOutOneCandle();
                } else {
                    clearInterval(blowInterval);
                }
            }, 350); 
        });

        function checkVolume() {
            if (activeCandles <= 0) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for(let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            let averageVolume = sum / bufferLength;

            micBar.style.width = averageVolume + '%';

            if (averageVolume > BLOW_THRESHOLD && !isBlowing) {
                isBlowing = true;
                blowOutOneCandle();
                setTimeout(() => { isBlowing = false; }, 400); 
            }

            requestAnimationFrame(checkVolume);
        }

        function blowOutOneCandle() {
            for (let i = 0; i < candleWrappers.length; i++) {
                const flame = candleWrappers[i].querySelector('.flame');
                if (!flame.classList.contains('out')) {
                    
                    const smoke = document.createElement('div');
                    smoke.classList.add('smoke');
                    candleWrappers[i].appendChild(smoke);

                    flame.classList.add('out');
                    activeCandles--;
                    break;
                }
            }

            // Reveal + Confetti
            if (activeCandles === 0) {
                setTimeout(() => {
                    cakeContainer.style.display = 'none';
                    revealScreen.classList.add('show');
                    
                    // Trigger Confetti Cannon
                    confetti({
                        particleCount: 150,
                        spread: 80,
                        origin: { y: 0.6 },
                        colors: ['#e94560', '#ffcf40', '#4caf50', '#ffffff', '#00bcd4'],
                        zIndex: 1000
                    });

                }, 1200); 
            }
        }
    </script>
</body>
</html>
