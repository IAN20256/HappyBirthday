<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            background-color: #0f0f1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            position: relative;
            perspective: 1000px; 
        }

        #cursor-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        #lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            z-index: 100;
        }

        #lang-toggle:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .parallax-layer {
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
            z-index: 50;
        }

        button.action-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.action-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        button.failsafe-btn {
            padding: 10px 20px;
            font-size: 0.9rem;
            background-color: transparent;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            cursor: pointer;
            margin-top: 40px;
            transition: all 0.2s;
            position: relative;
            z-index: 50;
        }

        button.failsafe-btn:hover {
            background-color: rgba(255,255,255,0.1);
            color: white;
        }

        #cake-container {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -50px;
            margin-left: -125px; 
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }

        #cake-wrapper {
            position: relative;
            border-radius: 50%;
            transition: box-shadow 0.1s ease-out, transform 0.1s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.5) translateY(50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .cake {
            width: 250px;
            height: 100px;
            background-color: #f7a8b8;
            border-radius: 10px 10px 0 0;
            position: relative;
            border-bottom: 15px solid #d37c8e;
            box-shadow: inset 0 -20px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.3);
        }

        .candles {
            display: flex;
            justify-content: space-around;
            width: 80%;
            position: absolute;
            bottom: 100%;
            left: 10%;
        }

        .candle-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .candle {
            width: 12px;
            height: 40px;
            background: repeating-linear-gradient(45deg, #fff, #fff 5px, #ffb3c6 5px, #ffb3c6 10px);
            border-radius: 3px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        .flame {
            width: 16px;
            height: 24px;
            background-color: #ff9d00;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px #ff9d00, 0 0 30px #ff5100;
            animation: flicker 0.1s infinite alternate;
            margin-bottom: 2px;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform-origin: bottom center;
        }

        .flame.out {
            opacity: 0;
            animation: none;
            box-shadow: none;
            transform: scale(0);
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-2deg); }
            100% { transform: scale(1.1) rotate(2deg); background-color: #ffc107; }
        }

        #reveal-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease-in;
            z-index: 30;
        }

        #reveal-screen.show {
            display: flex;
            opacity: 1;
        }

        .glitch-text {
            color: #ffffff;
            font-size: 5vw; 
            font-weight: bold;
            position: relative;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .glitch-text::before {
            left: 3px;
            text-shadow: -2px 0 #00ffff;
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
            background: #0f0f1a;
        }

        .glitch-text::after {
            left: -3px;
            text-shadow: -2px 0 #ff00ff;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
            background: transparent;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
            40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
            80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); }
            100% { clip-path: inset(30% 0 50% 0); transform: translate(1px, -1px); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
            20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 1px); }
            40% { clip-path: inset(70% 0 10% 0); transform: translate(2px, -2px); }
            60% { clip-path: inset(20% 0 50% 0); transform: translate(-2px, 2px); }
            80% { clip-path: inset(50% 0 30% 0); transform: translate(1px, -1px); }
            100% { clip-path: inset(5% 0 80% 0); transform: translate(-1px, 1px); }
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 60px;
            height: 75px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            cursor: pointer;
            z-index: 25;
            animation: floatUp 8s linear forwards;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), inset 5px 5px 15px rgba(255,255,255,0.4);
        }

        .balloon::before {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-bottom: 8px solid inherit;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-60vh) rotate(5deg); }
            100% { transform: translateY(-120vh) rotate(-5deg); }
        }

        /* Shard styling for the DOM Shatter effect */
        .cake-shard {
            position: absolute;
            z-index: 1000;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <canvas id="cursor-canvas"></canvas>

    <button id="lang-toggle">ESP</button>

    <div id="start-screen" class="parallax-layer" data-speed="0.05">
        <h2 id="text-ready-title" style="font-size: 2.5rem; margin-bottom: 5px;">Ready for your cake?</h2>
        <p id="text-ready-desc" style="color: #888;">(Make sure to allow microphone access so you can blow out the candles!)</p>
        <button id="start-btn" class="action-btn">Bring out the Cake</button>
    </div>

    <div id="cake-container" class="parallax-layer" data-speed="0.1">
        <div id="cake-wrapper">
            <div class="cake" id="the-cake">
                <div class="candles">
                    <div class="candle-wrapper"><div class="flame"></div><div class="candle"></div></div>
                    <div class="candle-wrapper"><div class="flame"></div><div class="candle"></div></div>
                    <div class="candle-wrapper"><div class="flame"></div><div class="candle"></div></div>
                </div>
            </div>
        </div>
        <button id="failsafe-btn" class="failsafe-btn">Mic not working? Tap to blow</button>
    </div>

    <div id="reveal-screen" class="parallax-layer" data-speed="0.2">
        <h1 id="text-bday-title" class="glitch-text" data-text="Happy Birthday!">Happy Birthday!</h1>
    </div>

    <script>
        const dict = {
            en: {
                readyTitle: "Ready for your cake?",
                readyDesc: "(Make sure to allow microphone access so you can blow out the candles!)",
                startBtn: "Bring out the Cake",
                bdayTitle: "Happy Birthday!",
                toggleTxt: "ESP",
                failsafeBtn: "Mic not working? Tap to blow"
            },
            es: {
                readyTitle: "¿Listo para tu pastel?",
                readyDesc: "(¡Asegúrate de permitir el acceso al micrófono para poder apagar las velas!)",
                startBtn: "Traer el Pastel",
                bdayTitle: "¡Feliz Cumpleaños!",
                toggleTxt: "ENG",
                failsafeBtn: "¿No funciona el micrófono? Toca para soplar"
            }
        };

        let currentLang = 'en';

        const langToggle = document.getElementById('lang-toggle');
        const textReadyTitle = document.getElementById('text-ready-title');
        const textReadyDesc = document.getElementById('text-ready-desc');
        const startBtn = document.getElementById('start-btn');
        const textBdayTitle = document.getElementById('text-bday-title');
        const failsafeBtn = document.getElementById('failsafe-btn');
        
        const startScreen = document.getElementById('start-screen');
        const cakeContainer = document.getElementById('cake-container');
        const cakeWrapper = document.getElementById('cake-wrapper');
        const theCake = document.getElementById('the-cake');
        const revealScreen = document.getElementById('reveal-screen');
        const candleWrappers = document.querySelectorAll('.candle-wrapper');

        let audioContext;
        let analyser;
        let microphone;
        let activeCandles = candleWrappers.length;
        let isBlowing = false;
        let experienceFinished = false;

        const BLOW_THRESHOLD = 60; 

        // --- 1. MAGIC WAND PARTICLE CURSOR ---
        const canvas = document.getElementById('cursor-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const colors = ['#00ffff', '#ff00ff', '#ffffff', '#e94560', '#ffcf40'];

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        function createParticles(x, y) {
            for (let i = 0; i < 2; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: Math.random() * 4 + 1,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02; 
            }
            particles = particles.filter(p => p.life > 0);
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        window.addEventListener('mousemove', (e) => createParticles(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => createParticles(e.touches[0].clientX, e.touches[0].clientY));

        // --- 2. 3D PARALLAX EFFECT ---
        const layers = document.querySelectorAll('.parallax-layer');
        function applyParallax(x, y) {
            layers.forEach(layer => {
                const speed = layer.getAttribute('data-speed');
                const xOffset = (window.innerWidth / 2 - x) * speed;
                const yOffset = (window.innerHeight / 2 - y) * speed;
                
                if(layer.id === 'reveal-screen') {
                    layer.style.transform = `translate(-50%, -50%) translate3d(${xOffset}px, ${yOffset}px, 0)`;
                } else {
                    layer.style.transform = `translate3d(${xOffset}px, ${yOffset}px, 0)`;
                }
            });
        }
        window.addEventListener('mousemove', (e) => applyParallax(e.clientX, e.clientY));
        window.addEventListener('deviceorientation', (e) => {
            if(e.gamma === null || e.beta === null) return;
            const x = window.innerWidth / 2 + (e.gamma * 10); 
            const y = window.innerHeight / 2 + ((e.beta - 45) * 10);
            applyParallax(x, y);
        });

        // --- 3. INTERACTIVE PHYSICS BALLOONS ---
        function startBalloons() {
            const balloonColors = ['#e94560', '#00bcd4', '#ffeb3b', '#ff4081', '#4caf50'];
            setInterval(() => {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon');
                balloon.style.left = Math.random() * 90 + 'vw';
                const bgCol = balloonColors[Math.floor(Math.random() * balloonColors.length)];
                balloon.style.backgroundColor = bgCol;
                balloon.style.borderBottomColor = bgCol; 

                balloon.addEventListener('click', (e) => {
                    confetti({
                        particleCount: 30,
                        spread: 40,
                        origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
                        colors: [bgCol, '#ffffff']
                    });
                    balloon.remove(); 
                });
                document.body.appendChild(balloon);
                setTimeout(() => balloon.remove(), 8000);
            }, 600); 
        }

        // --- 4. 8-BIT SYNTHESIZER FANFARE ---
        function play8BitFanfare() {
            const synthCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // "Happy Birthday To You" in frequencies
            const notes = [
                { f: 392.00, d: 0.15, t: 0 },    // G4
                { f: 392.00, d: 0.15, t: 0.2 },  // G4
                { f: 440.00, d: 0.3,  t: 0.4 },  // A4
                { f: 392.00, d: 0.3,  t: 0.8 },  // G4
                { f: 523.25, d: 0.3,  t: 1.2 },  // C5
                { f: 493.88, d: 0.6,  t: 1.6 },  // B4

                { f: 392.00, d: 0.15, t: 2.4 },  // G4
                { f: 392.00, d: 0.15, t: 2.6 },  // G4
                { f: 440.00, d: 0.3,  t: 2.8 },  // A4
                { f: 392.00, d: 0.3,  t: 3.2 },  // G4
                { f: 587.33, d: 0.3,  t: 3.6 },  // D5
                { f: 523.25, d: 0.8,  t: 4.0 }   // C5
            ];

            notes.forEach(note => {
                const osc = synthCtx.createOscillator();
                const gain = synthCtx.createGain();
                
                osc.type = 'square'; // 8-bit sound
                osc.frequency.setValueAtTime(note.f, synthCtx.currentTime + note.t);
                
                // Volume envelope to avoid popping clicks
                gain.gain.setValueAtTime(0, synthCtx.currentTime + note.t);
                gain.gain.linearRampToValueAtTime(0.1, synthCtx.currentTime + note.t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, synthCtx.currentTime + note.t + note.d);

                osc.connect(gain);
                gain.connect(synthCtx.destination);

                osc.start(synthCtx.currentTime + note.t);
                osc.stop(synthCtx.currentTime + note.t + note.d);
            });
        }

        // --- 5. DOM SHATTER PHYSICS ---
        function triggerShatter() {
            // Get absolute position of the cake before removing it
            const rect = theCake.getBoundingClientRect();
            cakeContainer.style.display = 'none'; // Hide the original
            
            const shardColors = ['#f7a8b8', '#d37c8e', '#ff9d00', '#fff', '#e94560'];
            const shards = [];

            // Generate 50 physical shards
            for (let i = 0; i < 50; i++) {
                const shard = document.createElement('div');
                shard.classList.add('cake-shard');
                
                // Random size and color
                const size = Math.random() * 20 + 5;
                shard.style.width = size + 'px';
                shard.style.height = size + 'px';
                shard.style.backgroundColor = shardColors[Math.floor(Math.random() * shardColors.length)];
                
                // Start exactly where the cake was
                shard.style.left = (rect.left + Math.random() * rect.width) + 'px';
                shard.style.top = (rect.top + Math.random() * rect.height) + 'px';
                
                document.body.appendChild(shard);

                // Assign physics properties
                shards.push({
                    el: shard,
                    vx: (Math.random() - 0.5) * 20,       // Explosion left/right
                    vy: (Math.random() - 1) * 20,         // Explosion upward
                    vr: (Math.random() - 0.5) * 30,       // Spin
                    r: 0
                });
            }

            // Animation Loop
            function animateShards() {
                let active = false;
                shards.forEach(s => {
                    if(!s.el) return;

                    s.vy += 0.8; // Gravity pull
                    const currentTop = parseFloat(s.el.style.top);
                    const currentLeft = parseFloat(s.el.style.left);
                    
                    s.r += s.vr;
                    s.el.style.top = (currentTop + s.vy) + 'px';
                    s.el.style.left = (currentLeft + s.vx) + 'px';
                    s.el.style.transform = `rotate(${s.r}deg)`;

                    // Keep animating if it's still on screen
                    if (currentTop < window.innerHeight) {
                        active = true;
                    } else {
                        s.el.remove(); // Delete DOM node when it falls off
                        s.el = null;
                    }
                });

                if (active) {
                    requestAnimationFrame(animateShards);
                }
            }
            requestAnimationFrame(animateShards);
        }

        // --- CORE UI LOGIC ---
        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'es' : 'en';
            textReadyTitle.innerText = dict[currentLang].readyTitle;
            textReadyDesc.innerText = dict[currentLang].readyDesc;
            startBtn.innerText = dict[currentLang].startBtn;
            textBdayTitle.innerText = dict[currentLang].bdayTitle;
            textBdayTitle.setAttribute('data-text', dict[currentLang].bdayTitle);
            failsafeBtn.innerText = dict[currentLang].failsafeBtn;
            langToggle.innerText = dict[currentLang].toggleTxt;
        });

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                startScreen.style.opacity = '0';
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    cakeContainer.style.display = 'flex';
                }, 500);

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.8; 
                checkVolume();
            } catch (err) {
                startScreen.style.display = 'none';
                cakeContainer.style.display = 'flex';
            }
        });

        failsafeBtn.addEventListener('click', () => {
            failsafeBtn.style.display = 'none'; 
            let blowInterval = setInterval(() => {
                if (activeCandles > 0) {
                    blowOutOneCandle();
                } else {
                    clearInterval(blowInterval);
                }
            }, 350); 
        });

        function checkVolume() {
            if (activeCandles <= 0 || experienceFinished) return;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for(let i = 0; i < bufferLength; i++) { sum += dataArray[i]; }
            let averageVolume = sum / bufferLength;

            const glowIntensity = averageVolume * 1.5;
            const scaleAmount = 1 + (averageVolume / 500); 
            
            if (averageVolume > 10) {
                cakeWrapper.style.boxShadow = `0 0 ${glowIntensity}px ${glowIntensity / 2}px rgba(233, 69, 96, 0.4)`;
                cakeWrapper.style.transform = `scale(${scaleAmount})`;
            } else {
                cakeWrapper.style.boxShadow = `none`;
                cakeWrapper.style.transform = `scale(1)`;
            }

            if (averageVolume > BLOW_THRESHOLD && !isBlowing) {
                isBlowing = true;
                blowOutOneCandle();
                setTimeout(() => { isBlowing = false; }, 400); 
            }
            requestAnimationFrame(checkVolume);
        }

        function blowOutOneCandle() {
            for (let i = 0; i < candleWrappers.length; i++) {
                const flame = candleWrappers[i].querySelector('.flame');
                if (!flame.classList.contains('out')) {
                    flame.classList.add('out');
                    activeCandles--;
                    break;
                }
            }

            if (activeCandles === 0 && !experienceFinished) {
                experienceFinished = true;
                cakeWrapper.style.boxShadow = `none`;
                
                setTimeout(() => {
                    // 1. Play the 8-Bit Synth
                    play8BitFanfare();
                    
                    // 2. Trigger the Gravity Shatter Physics
                    triggerShatter();
                    
                    // 3. Show the Glitch Text (slightly delayed for dramatic effect)
                    setTimeout(() => {
                        revealScreen.classList.add('show');
                        
                        // 4. Confetti Explosion
                        confetti({
                            particleCount: 200,
                            spread: 100,
                            origin: { y: 0.6 },
                            colors: ['#00ffff', '#ff00ff', '#ffffff', '#e94560'],
                            zIndex: 1000,
                            disableForReducedMotion: true
                        });

                        // 5. Start the Interactive Balloons
                        startBalloons();
                    }, 500);

                }, 800); 
            }
        }
    </script>
</body>
</html>
